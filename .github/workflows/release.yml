# Release: build, Developer ID sign, notarize, staple, upload to GitHub Releases.
#
# Trigger: push a tag whose name starts with v (e.g. v2026.04.2, v1.0.0-pre.1).
# Example: git tag v2026.04.2 && git push origin v2026.04.2
#
# Required repository secrets:
#   BUILD_CERTIFICATE_BASE64  — PKCS#12 (.p12) containing "Developer ID Application" cert + private key (base64)
#   P12_PASSWORD              — password for the .p12
#   CODESIGN_IDENTITY         — full Developer ID Application identity string (e.g. "Developer ID Application: Your Name (...)");
#                              same quoted name as in Keychain Access or security find-identity -v -p codesigning
#   APPLE_ID                  — Apple ID email used for notarization
#   APPLE_APP_SPECIFIC_PASSWORD — app-specific password (appleid.apple.com → App-Specific Passwords)
#   APPLE_TEAM_ID             — 10-character Team ID (same as DEVELOPMENT_TEAM in Xcode, e.g. ...)
#
# One-time: create a Developer ID Application certificate in the Apple Developer portal, export as .p12
# from Keychain Access, then: base64 -i Certificate.p12 | pbcopy → paste into BUILD_CERTIFICATE_BASE64.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Set signing identity
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          echo "SIGNING_IDENTITY=$CODESIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Foil.xcodeproj \
            -scheme Foil \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/Foil.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY"

      - name: Export Developer ID app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import plistlib
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "ExportOptions.plist"
          data = {
              "method": "developer-id",
              "signingStyle": "manual",
              "teamID": os.environ["APPLE_TEAM_ID"],
              "signingCertificate": "Developer ID Application",
          }
          path.write_bytes(plistlib.dumps(data))
          PY
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Foil.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/export/Foil.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app at $APP_PATH" >&2
            ls -la "$RUNNER_TEMP/export" >&2
            exit 1
          fi
          ZIP_PATH="$RUNNER_TEMP/Foil-${{ github.ref_name }}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          RELEASE_ZIP="$RUNNER_TEMP/Foil-${{ github.ref_name }}.zip"
          rm -f "$RELEASE_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$RELEASE_ZIP"

      - name: Upload release asset
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          # Same path as notarize step; use runner.temp + ref_name so linters see a valid context (not env from GITHUB_ENV).
          files: ${{ runner.temp }}/Foil-${{ github.ref_name }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup runner temp and keychain
        if: always()
        run: |
          set +e
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -rf "$RUNNER_TEMP/Foil.xcarchive"
          rm -rf "$RUNNER_TEMP/export"
          rm -f "$RUNNER_TEMP/ExportOptions.plist"
          rm -f "$RUNNER_TEMP/Foil-${{ github.ref_name }}.zip"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
